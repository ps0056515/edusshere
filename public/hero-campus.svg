<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="45%" style="stop-color:#2d4a6e"/>
      <stop offset="100%" style="stop-color:#1a2744"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:0.08"/>
    </linearGradient>
    <filter id="soft" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#sky)"/>
  <!-- distant hills -->
  <path fill="#0f172a" opacity="0.55" d="M0 720 L320 640 L640 700 L960 620 L1280 680 L1600 600 L1920 650 L1920 1080 L0 1080 Z"/>
  <path fill="#0b1120" opacity="0.7" d="M0 780 L400 700 L800 760 L1200 680 L1600 740 L1920 700 L1920 1080 L0 1080 Z"/>
  <!-- main building block (library / admin tower feel) -->
  <g opacity="0.85">
    <rect x="680" y="380" width="560" height="420" rx="4" fill="#1e293b"/>
    <rect x="720" y="420" width="80" height="140" fill="url(#glass)" opacity="0.9"/>
    <rect x="820" y="420" width="80" height="140" fill="url(#glass)" opacity="0.9"/>
    <rect x="920" y="420" width="80" height="140" fill="url(#glass)" opacity="0.9"/>
    <rect x="1020" y="420" width="80" height="140" fill="url(#glass)" opacity="0.9"/>
    <rect x="1120" y="420" width="80" height="140" fill="url(#glass)" opacity="0.9"/>
    <rect x="720" y="580" width="80" height="160" fill="url(#glass)" opacity="0.9"/>
    <rect x="820" y="580" width="80" height="160" fill="url(#glass)" opacity="0.9"/>
    <rect x="920" y="580" width="80" height="160" fill="url(#glass)" opacity="0.9"/>
    <rect x="1020" y="580" width="80" height="160" fill="url(#glass)" opacity="0.9"/>
    <rect x="1120" y="580" width="80" height="160" fill="url(#glass)" opacity="0.9"/>
    <!-- central spire -->
    <rect x="930" y="260" width="60" height="130" fill="#334155"/>
    <polygon points="960,200 1010,280 910,280" fill="#475569"/>
    <rect x="948" y="200" width="24" height="90" fill="#64748b" opacity="0.5"/>
  </g>
  <!-- left wing -->
  <g opacity="0.75">
    <rect x="380" y="480" width="280" height="320" rx="3" fill="#1e293b"/>
    <rect x="410" y="520" width="50" height="90" fill="#334155" opacity="0.6"/>
    <rect x="470" y="520" width="50" height="90" fill="#334155" opacity="0.6"/>
    <rect x="530" y="520" width="50" height="90" fill="#334155" opacity="0.6"/>
    <rect x="410" y="630" width="50" height="100" fill="#334155" opacity="0.6"/>
    <rect x="470" y="630" width="50" height="100" fill="#334155" opacity="0.6"/>
    <rect x="530" y="630" width="50" height="100" fill="#334155" opacity="0.6"/>
  </g>
  <!-- right wing -->
  <g opacity="0.75">
    <rect x="1260" y="500" width="320" height="300" rx="3" fill="#1e293b"/>
    <rect x="1290" y="540" width="55" height="100" fill="#334155" opacity="0.6"/>
    <rect x="1360" y="540" width="55" height="100" fill="#334155" opacity="0.6"/>
    <rect x="1430" y="540" width="55" height="100" fill="#334155" opacity="0.6"/>
    <rect x="1500" y="540" width="55" height="100" fill="#334155" opacity="0.6"/>
    <rect x="1290" y="660" width="55" height="110" fill="#334155" opacity="0.6"/>
    <rect x="1360" y="660" width="55" height="110" fill="#334155" opacity="0.6"/>
    <rect x="1430" y="660" width="55" height="110" fill="#334155" opacity="0.6"/>
  </g>
  <!-- subtle sun disc -->
  <circle cx="260" cy="220" r="70" fill="#f59e0b" opacity="0.12" filter="url(#soft)"/>
  <!-- ground -->
  <rect x="0" y="900" width="1920" height="180" fill="#0b1120" opacity="0.4"/>
</svg>
